# role: Senior AI Researcher
bio: |
  I am a Senior AI Researcher at [Ocean Infinity](https://oceaninfinity.com/), eading R&D in machine learning for the autonomy and situational awareness of unmanned marine vehicles.

  My career spans more than 15 years across academia, defense, and industry, specializing in navigation and localization, sensor fusion, target tracking, and SLAM for marine robotics.

  I hold a PhD in Electrical and Computer Engineering from the University of Porto.
